# docker-compose version removed (Compose V2 infers version)

services:
  # ------------------------------------------------------------
  # Backend – Node/Express API
  # ------------------------------------------------------------
  backend:
    container_name: truck-system-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./atlas-credentials.env
    environment:
      - NODE_NO_WARNINGS=1
    env_file:
      - ./backend/.env
    restart: unless-stopped
    depends_on:
      - mongo

  # ------------------------------------------------------------
  # Frontend – Vite / React
  # ------------------------------------------------------------
  frontend:
    container_name: truck-system-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - NODE_ENV=development
    volumes:
      # Live mount — edits hot-reload instantly via Vite HMR (no rebuild needed)
      - ./frontend:/app
      # Use the image's node_modules, not the host's
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

  # ------------------------------------------------------------
  # (Optional) Local MongoDB for testing – keep commented if you prefer Atlas
  # ------------------------------------------------------------
  mongo:
    container_name: truck-system-mongo
    image: mongo:7
    command: --quiet
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: truck_parts

volumes:
  frontend_node_modules:
  mongo-data:
