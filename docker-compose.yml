# docker-compose version removed (Compose V2 infers version)

services:
  # ------------------------------------------------------------
  # Backend – Node/Express API
  # ------------------------------------------------------------
  backend:
    container_name: truck-system-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./atlas-credentials.env
      - ./backend/.env
    environment:
      - NODE_NO_WARNINGS=1
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/api/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 2s
    depends_on:
      mongo:
        condition: service_started

  # ------------------------------------------------------------
  # Frontend – Vite / React
  # ------------------------------------------------------------
  frontend:
    container_name: truck-system-frontend
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - NODE_ENV=development
      - BACKEND_PROXY_TARGET=http://backend:5000
      - NODE_OPTIONS=--max-http-header-size=245760
    volumes:
      # Live mount — edits hot-reload instantly via Vite HMR (no rebuild needed)
      - ./frontend:/app:delegated
      # Use the image's node_modules, not the host's
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: always

  # ------------------------------------------------------------
  # (Optional) Local MongoDB for testing – keep commented if you prefer Atlas
  # ------------------------------------------------------------
  mongo:
    container_name: truck-system-mongo
    image: mongo:7
    command: --quiet
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: truck_parts

volumes:
  frontend_node_modules:
  mongo-data:
